<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agentic LinkedIn Post Architect</title>
    <!-- Outfit Google Font -->
    <link rel="stylesheet" href="/frontend/styles.css">
    <!-- HTMX library CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body hx-headers='{"X-API-Key": "sk-lm-CacWt1lF:7PcK3SXc1N1CuSuAIWeu"}'>

    <div class="container">
        <header>
            <h1>AI Agentic LinkedIn Post Architect</h1>
            <p>Draft high-impact content blueprint documents using a 3-Agent specialized team</p>
        </header>

        <div class="grid">
            <!-- Sidebar: Launch Form & History -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                
                <!-- Launch Form Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        Generate New Blueprint
                    </h2>
                    
                    <form hx-post="/api/v1/html/create-post" 
                          hx-target="#active-workflow-container" 
                          hx-swap="innerHTML"
                          hx-indicator="#submit-indicator"
                          hx-on::after-request="this.reset(); htmx.trigger('#history-container', 'reload-history')">
                        
                        <div class="form-group">
                            <label for="topic">Topic Prompt</label>
                            <input type="text" id="topic" name="topic" placeholder="e.g., The Future of AI Agents in B2B SaaS" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="target_audience">Target Audience</label>
                            <input type="text" id="target_audience" name="target_audience" placeholder="e.g., Tech Founders & VC investors">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="tone">Tone of Voice</label>
                                <select id="tone" name="tone">
                                    <option value="professional">Professional</option>
                                    <option value="casual">Casual & Friendly</option>
                                    <option value="inspirational">Inspirational</option>
                                    <option value="educational">Educational</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="post_length">Length</label>
                                <select id="post_length" name="post_length">
                                    <option value="short">Short (punchy)</option>
                                    <option value="medium" selected>Medium (balanced)</option>
                                    <option value="long">Long (comprehensive)</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn">
                            <span id="submit-indicator" class="htmx-indicator pulse" style="margin-right: 0.5rem;">⏳</span>
                            Assemble Agents
                        </button>
                    </form>
                </div>

                <!-- History Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        Past Blueprints
                    </h2>
                    
                    <div id="history-container" 
                         hx-get="/api/v1/html/workflows/list" 
                         hx-trigger="load, reload-history from:body" 
                         hx-swap="innerHTML">
                        <div class="empty-state pulse">Loading blueprint archive...</div>
                    </div>
                </div>

            </div>

            <!-- Main Panel: Active workflow & Blueprint inspection -->
            <div id="active-workflow-container">
                <div class="card" style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 400px;">
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1.5rem;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
                        <p style="font-size: 1.2rem; margin-bottom: 0.5rem; color: #e5e7eb;">No active strategy running</p>
                        <p style="font-size: 0.95rem;">Launch a new agent team using the generator form on the left!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
